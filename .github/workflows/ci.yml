name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Run go vet
        run: go vet ./...

      - name: Check for UTF-8 BOM in Go source files
        run: |
          if grep -rl $'\xef\xbb\xbf' --include="*.go" .; then
            echo "BOM found in .go files — remove the BOM before merging"
            exit 1
          fi
          echo "No BOM found"

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  integration:
    name: Test (pgx integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forgetest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run pgx integration tests
        working-directory: pgx
        env:
          DATABASE_URL: postgres://forge:forge@localhost:5432/forgetest
        run: go test -v -tags integration ./...

      - name: Run core integration tests
        working-directory: pgx
        env:
          DATABASE_URL: postgres://forge:forge@localhost:5432/forgetest
        run: go test -v -tags integration ./...
